{% load i18n %}
<div class="card mb-3">
    <h5 class="card-header">{% trans "WDM Node" %}</h5>
    <div class="card-body text-center py-4">
        <p class="text-muted mb-3">{% trans "This device type has a WDM profile. Create a WDM node to manage wavelength channels." %}</p>
        <a href="{% url 'plugins:netbox_fms:wdmnode_add' %}?device={{ device.pk }}" class="btn btn-sm btn-primary">
            <i class="mdi mdi-sine-wave"></i> {% trans "Create WDM Node" %}
        </a>
    </div>
</div>
