{% load i18n %}
{% load static %}
<style>
.trace-container {
    display: flex;
    min-height: 500px;
    border: 1px solid var(--bs-border-color);
    border-radius: 0.375rem;
    overflow: hidden;
}
.trace-canvas {
    flex: 1;
    position: relative;
    overflow-y: auto;
}
.trace-sidebar {
    width: 340px;
    min-width: 340px;
    border-left: 1px solid var(--bs-border-color);
    display: flex;
    flex-direction: column;
    background: var(--bs-body-bg);
}
.trace-sidebar-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--bs-secondary-color);
}
.trace-detail-header {
    padding: 0.75rem;
    border-bottom: 1px solid var(--bs-border-color);
    flex-shrink: 0;
}
.trace-detail-body {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
}
.trace-detail-table th {
    width: 40%;
    font-weight: 600;
    font-size: 0.85rem;
}
.trace-detail-table td {
    font-size: 0.85rem;
}
.trace-loss-summary {
    flex-shrink: 0;
    padding: 0.75rem;
}
.trace-breadcrumb {
    padding: 0.5rem 1rem;
    font-size: 0.85rem;
    color: var(--bs-secondary-color);
    border-bottom: 1px solid var(--bs-border-color);
}
.trace-breadcrumb a {
    color: var(--bs-link-color);
    text-decoration: none;
}
.trace-loading {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 300px;
}
.trace-search-bar {
    padding: 0.5rem;
    border-bottom: 1px solid var(--bs-border-color);
    flex-shrink: 0;
}
.trace-stats-bar {
    padding: 0.25rem 0.75rem;
    font-size: 0.75rem;
    color: var(--bs-secondary-color);
    border-bottom: 1px solid var(--bs-border-color);
    flex-shrink: 0;
}
.trace-feature-list {
    flex: 1;
    overflow-y: auto;
}
.trace-list-item {
    padding: 0.5rem 0.75rem;
    cursor: pointer;
    border-bottom: 1px solid var(--bs-border-color-translucent);
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.4rem;
}
.trace-list-item:hover {
    background: var(--bs-tertiary-bg);
}
.trace-list-item.active {
    background: var(--bs-primary-bg-subtle);
}
.trace-list-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
}
.trace-list-name {
    font-size: 0.85rem;
    font-weight: 500;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.trace-list-badge {
    font-size: 0.7rem;
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
    background: var(--bs-secondary-bg);
    color: var(--bs-secondary-color);
    flex-shrink: 0;
}
.trace-list-subtitle {
    width: 100%;
    font-size: 0.75rem;
    color: var(--bs-secondary-color);
    padding-left: 1.2rem;
}
</style>

<div class="trace-breadcrumb" id="trace-breadcrumb">
    <a href="{{ object.circuit.get_absolute_url }}">{{ object.circuit.name }}</a>
    &rsaquo; {% trans "Path" %} #{{ object.position }}
</div>
<div class="trace-container">
    <div class="trace-canvas" id="trace-canvas-container">
        <div class="trace-loading">
            <div class="spinner-border text-secondary" role="status">
                <span class="visually-hidden">{% trans "Loading..." %}</span>
            </div>
        </div>
    </div>
    <div class="trace-sidebar" id="trace-sidebar">
        <div id="trace-detail-panel">
            <div class="trace-sidebar-empty">
                <p>{% trans "Click a node to view details" %}</p>
            </div>
        </div>
    </div>
</div>

<script>
window.TRACE_VIEW_CONFIG = {
    pathId: {{ object.pk }},
    traceUrl: '/api/plugins/fms/fiber-circuit-paths/{{ object.pk }}/trace/',
    detailBaseUrl: '/plugins/fms/fiber-circuit-paths/{{ object.pk }}/trace-detail/',
    circuitName: '{{ object.circuit.name|escapejs }}',
    pathPosition: {{ object.position }},
};
</script>
